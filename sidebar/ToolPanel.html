<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<base target="_top">
<style>
  :root {
    --blue: #1a73e8; --blue-d: #0d47a1; --ink: #202124; --muted: #5f6368;
    --line: #e8eaed; --bg: #f1f3f4; --card: #fff; --red: #d93025;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--ink); font-size: 14px; line-height: 1.5; }
  .wrap { max-width: 960px; margin: 0 auto; padding: 0 16px 40px; }

  /* Top bar */
  .topbar { position: sticky; top: 0; z-index: 5; background: linear-gradient(135deg, var(--blue), var(--blue-d)); color: #fff; margin: 0 -16px 18px; padding: 18px 16px 16px; border-radius: 0 0 16px 16px; box-shadow: 0 2px 10px rgba(0,0,0,.12); }
  .brand { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tabs { display: flex; gap: 6px; margin-right: auto; }
  .tabs button { border: none; padding: 7px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,.16); color: #fff; }
  .tabs button.active { background: #fff; color: var(--blue); }
  .ctl { border: none; padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,.16); color: #fff; }
  .ctl.active { background: #fff; color: var(--blue); }
  .sel { display: flex; gap: 6px; align-items: center; padding: 3px 8px; border-radius: 999px; border: 2px solid transparent; }
  .sel.picked { border-color: #fff; background: rgba(255,255,255,.16); }
  .sel select { border: none; border-radius: 999px; padding: 5px 8px; font-size: 12px; font-weight: 600; background: rgba(255,255,255,.92); color: var(--blue); cursor: pointer; }

  /* KPI cards */
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .kpi { background: var(--card); border-radius: 14px; padding: 14px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .kpi .k-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .kpi .k-value { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
  .kpi .k-sub { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  @media (max-width: 640px) { .kpis { grid-template-columns: repeat(2, 1fr); } }

  /* Charts */
  .charts { display: grid; grid-template-columns: 1fr 1.3fr; gap: 12px; margin-bottom: 16px; }
  .panel { background: var(--card); border-radius: 14px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .panel h3 { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 12px; text-transform: none; }
  .donut-wrap { display: flex; gap: 14px; align-items: center; }
  .legend { flex: 1; min-width: 0; }
  .legend .lg { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 5px; }
  .legend .sw { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .legend .lg-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legend .lg-pct { color: var(--muted); }
  @media (max-width: 640px) { .charts { grid-template-columns: 1fr; } }

  /* Toolbar */
  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  .search { flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; font-size: 13px; background: var(--card); }
  .search:focus { outline: none; border-color: var(--blue); }
  .sortsel { border: 1px solid var(--line); border-radius: 10px; padding: 9px 10px; font-size: 13px; background: var(--card); cursor: pointer; }

  /* Item rows */
  .row-card { background: var(--card); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); cursor: pointer; transition: background .12s; }
  .row-card:hover { background: #f8faff; }
  .rc-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .rc-name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; min-width: 0; }
  .rc-name .dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .rc-total { font-weight: 700; font-size: 15px; color: var(--red); white-space: nowrap; }
  .rc-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .bar { height: 5px; border-radius: 3px; background: #eef1f6; margin-top: 7px; overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 3px; }

  /* Detail */
  .dhead { background: linear-gradient(135deg, var(--blue), var(--blue-d)); color: #fff; margin: 0 -16px 16px; padding: 16px; border-radius: 0 0 16px 16px; }
  .back { background: rgba(255,255,255,.16); border: none; color: #fff; font-size: 13px; cursor: pointer; padding: 6px 12px; border-radius: 999px; margin-bottom: 12px; }
  .dhead-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
  .dstats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .dstat { background: rgba(255,255,255,.15); border-radius: 10px; padding: 8px 10px; }
  .dstat .s-l { font-size: 10px; opacity: .8; } .dstat .s-v { font-size: 16px; font-weight: 700; }

  .card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.06); display: flex; align-items: center; gap: 10px; }
  .card-body { flex: 1; min-width: 0; }
  .card-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .merchant { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .amount { font-weight: 700; color: var(--red); white-space: nowrap; }
  .card-bottom { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .badge { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; color: #fff; }
  .badge-fubon { background: #1565c0; } .badge-cathay { background: #2e7d32; } .badge-other { background: #757575; }
  .gmail-link { color: var(--blue); text-decoration: none; font-size: 18px; opacity: .7; }
  .gmail-link:hover { opacity: 1; }

  .empty, .error, .loading { text-align: center; padding: 44px 20px; color: var(--muted); }
  .error { color: var(--red); }
  .big { font-size: 42px; margin-bottom: 10px; }
  .footer { text-align: center; padding: 14px; font-size: 12px; color: #9aa0a6; }
</style>
</head>
<body>
<div class="wrap"><div id="app"><div class="loading">載入中…</div></div></div>
<script>
  var PALETTE = ['#1a73e8','#34a853','#fbbc04','#ea4335','#a142f4','#24c1e0','#ff7043','#9aa0a6'];
  var state = { tab: 'category', scope: 'all', selYear: 0, selMonth: 0, sort: 'total', query: '', detailQuery: '' };
  var monthRange = null;
  var ov = null;      // last getOverview result
  var detail = null;  // last getTransactions result

  function app() { return document.getElementById('app'); }
  function pad2(n) { return (n < 10 ? '0' : '') + n; }
  function fmt(n) { return Math.round(Number(n) || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
  function esc(s) { var el = document.createElement('span'); el.textContent = (s == null ? '' : s); return el.innerHTML; }
  function badgeClass(b) { b = b || ''; if (b.indexOf('富邦') >= 0) return 'badge-fubon'; if (b.indexOf('國泰') >= 0) return 'badge-cathay'; return 'badge-other'; }
  function isPick() { return state.scope !== 'all' && state.scope !== 'month'; }
  function colorOf(i) { return PALETTE[i % PALETTE.length]; }

  function renderError(e) {
    var msg = (e && e.message) ? e.message : (typeof e === 'string' ? e : '發生錯誤');
    app().innerHTML = '<div class="error"><div class="big">&#9888;&#65039;</div><p>' + esc(msg) + '</p></div>';
  }

  // ---------- data loads ----------
  function loadOverview() {
    app().innerHTML = '<div class="loading">載入中…</div>';
    google.script.run.withSuccessHandler(function (d) {
      if (d && d.error) { renderError(d.error); return; }
      ov = d; renderOverview();
    }).withFailureHandler(renderError).getOverview(state.tab, state.scope);
  }
  function loadDetail(name) {
    app().innerHTML = '<div class="loading">載入中…</div>';
    state.detailQuery = '';
    google.script.run.withSuccessHandler(function (d) {
      if (d && d.error) { renderError(d.error); return; }
      detail = d; renderDetail();
    }).withFailureHandler(renderError).getTransactions(state.tab, name, state.scope);
  }

  // ---------- top bar ----------
  function yearOptions() {
    var minY = monthRange ? monthRange.minYear : state.selYear;
    var maxY = monthRange ? monthRange.maxYear : state.selYear;
    var o = '';
    for (var y = maxY; y >= minY; y--) o += '<option value="' + y + '"' + (y === state.selYear ? ' selected' : '') + '>' + y + '</option>';
    return o;
  }
  function monthOptions() {
    var o = '';
    for (var m = 1; m <= 12; m++) o += '<option value="' + m + '"' + (m === state.selMonth ? ' selected' : '') + '>' + m + ' 月</option>';
    return o;
  }
  function topbar() {
    return '<div class="topbar">' +
      '<div class="brand">交易工具</div>' +
      '<div class="row">' +
        '<div class="tabs">' +
          '<button data-tab="category" class="' + (state.tab === 'category' ? 'active' : '') + '">類別</button>' +
          '<button data-tab="tag" class="' + (state.tab === 'tag' ? 'active' : '') + '">TAG</button>' +
        '</div>' +
        '<button class="ctl' + (state.scope === 'all' ? ' active' : '') + '" data-scope="all">全部</button>' +
        '<button class="ctl' + (state.scope === 'month' ? ' active' : '') + '" data-scope="month">當月</button>' +
        '<span class="sel' + (isPick() ? ' picked' : '') + '"><select id="selYear">' + yearOptions() + '</select><select id="selMonth">' + monthOptions() + '</select></span>' +
      '</div></div>';
  }
  function attachTop() {
    var t = app().querySelectorAll('.tabs button');
    for (var i = 0; i < t.length; i++) t[i].addEventListener('click', function () { state.tab = this.getAttribute('data-tab'); loadOverview(); });
    var c = app().querySelectorAll('.ctl');
    for (var j = 0; j < c.length; j++) c[j].addEventListener('click', function () { state.scope = this.getAttribute('data-scope'); loadOverview(); });
    var sy = document.getElementById('selYear'), sm = document.getElementById('selMonth');
    function pick() { state.selYear = Number(sy.value); state.selMonth = Number(sm.value); state.scope = state.selYear + '-' + pad2(state.selMonth); loadOverview(); }
    if (sy) sy.addEventListener('change', pick);
    if (sm) sm.addEventListener('change', pick);
  }

  // ---------- charts ----------
  function donutSVG(items, grand) {
    var R = 52, C = 2 * Math.PI * R, cx = 70, cy = 70;
    var top = items.slice(0, 6), rest = items.slice(6);
    var segs = top.map(function (it, i) { return { name: it.name, total: it.total, color: colorOf(i) }; });
    if (rest.length) segs.push({ name: '其他', total: rest.reduce(function (s, x) { return s + x.total; }, 0), color: '#cfd4da' });
    var svg = '<svg width="140" height="140" viewBox="0 0 140 140">';
    svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + R + '" fill="none" stroke="#eef1f6" stroke-width="22"/>';
    var acc = 0;
    if (grand > 0) {
      segs.forEach(function (s) {
        var frac = s.total / grand, dash = frac * C;
        svg += '<circle cx="' + cx + '" cy="' + cy + '" r="' + R + '" fill="none" stroke="' + s.color + '" stroke-width="22" ' +
          'stroke-dasharray="' + dash.toFixed(2) + ' ' + (C - dash).toFixed(2) + '" stroke-dashoffset="' + (-acc).toFixed(2) + '" transform="rotate(-90 ' + cx + ' ' + cy + ')"/>';
        acc += dash;
      });
    }
    svg += '<text x="70" y="66" text-anchor="middle" font-size="11" fill="#5f6368">總支出</text>';
    svg += '<text x="70" y="84" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">$' + fmt(grand) + '</text>';
    svg += '</svg>';
    var legend = '<div class="legend">';
    segs.forEach(function (s) {
      var pct = grand > 0 ? Math.round(s.total / grand * 100) : 0;
      legend += '<div class="lg"><span class="sw" style="background:' + s.color + '"></span><span class="lg-name">' + esc(s.name) + '</span><span class="lg-pct">' + pct + '%</span></div>';
    });
    legend += '</div>';
    return '<div class="donut-wrap">' + svg + legend + '</div>';
  }
  function trendSVG(trend, selYm) {
    var W = 300, H = 130, pad = 22, n = trend.length;
    var max = Math.max.apply(null, trend.map(function (t) { return t.total; }).concat([1]));
    var bw = (W - pad * 2) / n * 0.6, gap = (W - pad * 2) / n;
    var svg = '<svg width="100%" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
    trend.forEach(function (t, i) {
      var h = max > 0 ? (t.total / max) * (H - 46) : 0;
      var x = pad + i * gap + (gap - bw) / 2, y = H - 26 - h;
      var hot = (t.ym === selYm);
      svg += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + Math.max(h, 1).toFixed(1) + '" rx="3" fill="' + (hot ? '#1a73e8' : '#bcd0f7') + '"/>';
      if (t.total > 0) svg += '<text x="' + (x + bw / 2).toFixed(1) + '" y="' + (y - 4).toFixed(1) + '" text-anchor="middle" font-size="9" fill="#5f6368">' + fmt(Math.round(t.total / 1000)) + 'k</text>';
      svg += '<text x="' + (x + bw / 2).toFixed(1) + '" y="' + (H - 10) + '" text-anchor="middle" font-size="10" fill="' + (hot ? '#1a73e8' : '#9aa0a6') + '">' + esc(t.label) + '</text>';
    });
    svg += '</svg>';
    return svg;
  }

  // ---------- overview ----------
  function renderOverview() {
    var p = ov.period || { total: 0, count: 0, dailyAvg: 0, largest: null };
    var h = topbar();

    h += '<div class="kpis">';
    h += '<div class="kpi"><div class="k-label">總支出</div><div class="k-value">$' + fmt(p.total) + '</div></div>';
    h += '<div class="kpi"><div class="k-label">交易筆數</div><div class="k-value">' + p.count + '</div></div>';
    h += '<div class="kpi"><div class="k-label">日均</div><div class="k-value">$' + fmt(p.dailyAvg) + '</div></div>';
    h += '<div class="kpi"><div class="k-label">最大筆</div><div class="k-value">$' + fmt(p.largest ? p.largest.amount : 0) + '</div><div class="k-sub">' + (p.largest ? esc(p.largest.merchant) : '—') + '</div></div>';
    h += '</div>';

    h += '<div class="charts">';
    h += '<div class="panel"><h3>' + (state.tab === 'tag' ? 'TAG' : '類別') + '分佈</h3>' + donutSVG(ov.items, ov.grandTotal) + '</div>';
    h += '<div class="panel"><h3>近 6 個月支出</h3>' + trendSVG(ov.trend || [], isPick() ? state.scope : '') + '</div>';
    h += '</div>';

    h += '<div class="toolbar">' +
      '<input id="q" class="search" type="text" placeholder="搜尋' + (state.tab === 'tag' ? ' TAG' : '類別') + '名稱…" value="' + esc(state.query) + '">' +
      '<select id="sortsel" class="sortsel">' +
        '<option value="total"' + (state.sort === 'total' ? ' selected' : '') + '>依金額</option>' +
        '<option value="count"' + (state.sort === 'count' ? ' selected' : '') + '>依筆數</option>' +
        '<option value="name"' + (state.sort === 'name' ? ' selected' : '') + '>依名稱</option>' +
      '</select></div>';
    h += '<div id="list"></div>';
    h += '<div class="footer">共 ' + ov.items.length + ' 項 · 總計 $' + fmt(ov.grandTotal) + '</div>';

    app().innerHTML = h;
    attachTop();
    var q = document.getElementById('q'), ss = document.getElementById('sortsel');
    q.addEventListener('input', function () { state.query = this.value; renderList(); });
    ss.addEventListener('change', function () { state.sort = this.value; renderList(); });
    renderList();
  }

  function renderList() {
    var items = ov.items.slice();
    var q = state.query.trim().toLowerCase();
    if (q) items = items.filter(function (it) { return it.name.toLowerCase().indexOf(q) >= 0; });
    if (state.sort === 'count') items.sort(function (a, b) { return b.count - a.count; });
    else if (state.sort === 'name') items.sort(function (a, b) { return a.name.localeCompare(b.name); });
    else items.sort(function (a, b) { return b.total - a.total; });

    var box = document.getElementById('list');
    if (items.length === 0) { box.innerHTML = '<div class="empty"><div class="big">&#128202;</div><p>沒有符合的項目</p></div>'; return; }
    var max = items.reduce(function (m, it) { return Math.max(m, it.total); }, 0) || 1;
    // color by original rank so donut/legend/list match
    var rank = {}; ov.items.forEach(function (it, i) { rank[it.name] = i; });
    var html = '';
    items.forEach(function (it) {
      var col = colorOf(rank[it.name] != null ? rank[it.name] : 0);
      var pct = Math.max(3, Math.round(it.total / max * 100));
      html += '<div class="row-card" data-name="' + esc(it.name) + '">' +
        '<div class="rc-top"><span class="rc-name"><span class="dot" style="background:' + col + '"></span>' + esc(it.name) + '</span><span class="rc-total">$' + fmt(it.total) + '</span></div>' +
        '<div class="rc-meta">' + it.count + ' 筆</div>' +
        '<div class="bar"><i style="width:' + pct + '%;background:' + col + '"></i></div></div>';
    });
    box.innerHTML = html;
    var rows = box.querySelectorAll('.row-card');
    for (var i = 0; i < rows.length; i++) rows[i].addEventListener('click', function () { loadDetail(this.getAttribute('data-name')); });
  }

  // ---------- detail ----------
  function renderDetail() {
    var s = detail.stats || { total: 0, count: 0, largest: null };
    var h = '<div class="dhead">' +
      '<button class="back">&#8592; 返回</button>' +
      '<div class="dhead-title">' + esc(detail.name) + '</div>' +
      '<div class="dstats">' +
        '<div class="dstat"><div class="s-l">總金額</div><div class="s-v">$' + fmt(s.total) + '</div></div>' +
        '<div class="dstat"><div class="s-l">筆數</div><div class="s-v">' + s.count + '</div></div>' +
        '<div class="dstat"><div class="s-l">最大筆</div><div class="s-v">$' + fmt(s.largest ? s.largest.amount : 0) + '</div></div>' +
      '</div></div>';
    h += '<div class="toolbar"><input id="dq" class="search" type="text" placeholder="搜尋商店…" value="' + esc(state.detailQuery) + '"></div>';
    h += '<div id="dcards"></div>';
    app().innerHTML = h;
    document.querySelector('.back').addEventListener('click', loadOverview);
    var dq = document.getElementById('dq');
    dq.addEventListener('input', function () { state.detailQuery = this.value; renderCards(); });
    renderCards();
  }
  function renderCards() {
    var txns = detail.transactions.slice();
    var q = state.detailQuery.trim().toLowerCase();
    if (q) txns = txns.filter(function (t) { return (t.merchant || '').toLowerCase().indexOf(q) >= 0; });
    var box = document.getElementById('dcards');
    if (txns.length === 0) { box.innerHTML = '<div class="empty"><div class="big">&#128203;</div><p>沒有符合的交易</p></div>'; return; }
    var html = '';
    txns.forEach(function (t) {
      html += '<div class="card"><div class="card-body">' +
        '<div class="card-top"><span class="merchant" title="' + esc(t.merchant) + '">' + esc(t.merchant || '(未知商店)') + '</span><span class="amount">NT$' + fmt(t.amount) + '</span></div>' +
        '<div class="card-bottom"><span class="badge ' + badgeClass(t.bank) + '">' + esc(t.bank) + '</span><span>' + esc(t.date) + '</span>' + (t.last4 ? '<span>****' + esc(t.last4) + '</span>' : '') + '</div>' +
        '</div>' + (t.link ? '<a class="gmail-link" href="' + t.link + '" target="_blank" rel="noopener" title="開啟 Gmail">&#9993;&#65039;</a>' : '') + '</div>';
    });
    box.innerHTML = html;
    box.insertAdjacentHTML('beforeend', '<div class="footer">' + txns.length + ' 筆交易</div>');
  }

  // ---------- init ----------
  google.script.run.withSuccessHandler(function (r) {
    monthRange = r; state.selYear = r.curYear; state.selMonth = r.curMonth; loadOverview();
  }).withFailureHandler(function () {
    var n = new Date(); state.selYear = n.getFullYear(); state.selMonth = n.getMonth() + 1; loadOverview();
  }).getMonthSelectorRange();
</script>
</body>
</html>
